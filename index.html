<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aydym Tekjesi - Professional</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a2e 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        .header { text-align: center; padding: 40px 20px; }
        .header h1 { font-size: 3rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .upload-section {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px dashed var(--primary);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-section:hover { border-color: var(--secondary); transform: translateY(-2px); }
        .upload-section.dragover { background: rgba(99, 102, 241, 0.1); border-color: var(--secondary); }
        .upload-section i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }
        .upload-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 20px 25px;
            border-radius: 15px;
            flex: 1;
            min-width: 150px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .stat-icon.blue { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .stat-icon.pink { background: rgba(236, 72, 153, 0.2); color: var(--secondary); }
        .stat-icon.green { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .stat-info h4 { font-size: 1.5rem; }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
        }
        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid var(--bg-hover);
            border-radius: 15px;
            background: var(--bg-card);
            color: var(--text);
            font-size: 1rem;
        }
        .filter-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn {
            padding: 12px 20px;
            border: 2px solid var(--bg-hover);
            background: var(--bg-card);
            color: var(--text-muted);
            border-radius: 12px;
            cursor: pointer;
        }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 100px;
        }
        .music-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--bg-hover);
            transition: all 0.3s ease;
        }
        .music-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .music-card.playing { border-color: var(--secondary); box-shadow: 0 0 30px rgba(236, 72, 153, 0.3); }
        .card-visual {
            height: 180px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .card-visual i { font-size: 4rem; color: rgba(255, 255, 255, 0.9); }
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .music-card:hover .play-overlay { opacity: 1; }
        .play-btn-large {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--primary);
        }
        .card-info { padding: 20px; }
        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; }
        .card-artist { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; }
        .card-duration { color: var(--text-muted); font-size: 0.85rem; }
        .card-actions { display: flex; gap: 8px; }
        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--bg-hover);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .action-btn:hover { background: var(--primary); color: white; }
        .action-btn.delete:hover { background: var(--danger); }
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--bg-hover);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .player-bar.active { transform: translateY(0); }
        .player-info { display: flex; align-items: center; gap: 15px; flex: 0 0 250px; }
        .player-cover {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .player-title { font-weight: 600; }
        .player-artist { color: var(--text-muted); font-size: 0.85rem; }
        .player-controls { display: flex; align-items: center; gap: 15px; flex: 1; justify-content: center; }
        .control-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.2rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .control-btn.play {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        .progress-container {
            flex: 1;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--bg-hover);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
            width: 0%;
        }
        .time { font-size: 0.8rem; color: var(--text-muted); }
        .player-volume { flex: 0 0 150px; display: flex; align-items: center; gap: 10px; }
        .volume-slider { width: 100px; height: 6px; }
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            color: var(--text);
            padding: 15px 25px;
            border-radius: 12px;
            border-left: 4px solid var(--success);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--danger); }
        @media (max-width: 768px) {
            .player-volume { display: none; }
            .progress-container { order: 3; flex: 1 1 100%; max-width: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-music"></i> Aydym Tekjesi</h1>
            <p>Aydymlarynyzy ýükläň, diňläň we dolandyryň</p>
        </div>
        <div class="upload-section" id="dropZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <h3>Aydym Ýükle</h3>
            <p>MP3, WAV, OGG faýllaryny süýräň ýa-da saýlaň</p>
            <input type="file" id="fileInput" class="file-input" accept="audio/*" multiple style="display:none">
            <button class="upload-btn" id="uploadBtn">
                <i class="fas fa-plus"></i> Faýl Saýla
            </button>
        </div>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-music"></i></div>
                <div class="stat-info">
                    <h4 id="totalSongs">0</h4><p>Jemi Aýdym</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pink"><i class="fas fa-user"></i></div>
                <div class="stat-info">
                    <h4 id="totalArtists">0</h4><p>Ýaradyjy</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-clock"></i></div>
                <div class="stat-info">
                    <h4 id="totalDuration">0:00</h4><p>Jemi Wagt</p>
                </div>
            </div>
        </div>
        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search" style="position: absolute; margin: 18px 0 0 18px; color: var(--text-muted);"></i>
                <input type="text" id="searchInput" placeholder="Aýdym ýa-da ýaradyjy gözle...">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">Hemmesi</button>
                <button class="filter-btn" data-filter="recent">Soňky Goşulan</button>
                <button class="filter-btn" data-filter="name">Ady</button>
                <button class="filter-btn" data-filter="artist">Ýaradyjy</button>
            </div>
        </div>
        <div class="music-grid" id="musicGrid">
            <div class="empty-state">
                <i class="fas fa-music"></i>
                <h3>Häzirlikçe aydym ýok</h3>
                <p>Ýokardan aydym ýükläp başlaň</p>
            </div>
        </div>
    </div>
    <div class="player-bar" id="playerBar">
        <div class="player-info">
            <div class="player-cover"><i class="fas fa-music"></i></div>
            <div class="player-text">
                <div class="player-title" id="playerTitle">Aýdym Saýlanmady</div>
                <div class="player-artist" id="playerArtist">-</div>
            </div>
        </div>
        <div class="player-controls">
            <button class="control-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
            <button class="control-btn play" id="playBtn"><i class="fas fa-play"></i></button>
            <button class="control-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
        </div>
        <div class="progress-container">
            <span class="time" id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time" id="totalTime">0:00</span>
        </div>
        <div class="player-volume">
            <i class="fas fa-volume-up"></i>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
        </div>
    </div>
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Amal üstünlikli!</span>
    </div>

    <script>
        // IndexedDB bilen uly faýllary saklamak
        let db;
        let songs = [];
        let currentSongIndex = -1;
        let isPlaying = false;
        let audio = new Audio();
        let currentFilter = 'all';
        let searchQuery = '';

        // IndexedDB açmak
        const request = indexedDB.open('MusicLibrary', 1);
        
        request.onerror = () => console.log('DB error');
        request.onsuccess = (e) => {
            db = e.target.result;
            loadSongsFromDB();
        };
        
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            const store = db.createObjectStore('songs', { keyPath: 'id' });
            store.createIndex('dateAdded', 'dateAdded');
        };

        function loadSongsFromDB() {
            const transaction = db.transaction(['songs'], 'readonly');
            const store = transaction.objectStore('songs');
            const getAll = store.getAll();
            
            getAll.onsuccess = () => {
                songs = getAll.result || [];
                renderSongs();
                updateStats();
            };
        }

        function saveSongToDB(song) {
            const transaction = db.transaction(['songs'], 'readwrite');
            const store = transaction.objectStore('songs');
            store.add(song);
            
            transaction.oncomplete = () => {
                songs.push(song);
                renderSongs();
                updateStats();
                showToast(`"${song.title}" ýüklendi!`);
            };
        }

        function deleteSongFromDB(id) {
            const transaction = db.transaction(['songs'], 'readwrite');
            const store = transaction.objectStore('songs');
            store.delete(id);
            
            transaction.oncomplete = () => {
                songs = songs.filter(s => s.id !== id);
                if (currentSongIndex !== -1 && songs[currentSongIndex]?.id === id) {
                    pauseSong();
                    currentSongIndex = -1;
                    playerBar.classList.remove('active');
                }
                renderSongs();
                updateStats();
                showToast('Aýdym pozuldy');
            };
        }

        // DOM Elementler
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const musicGrid = document.getElementById('musicGrid');
        const searchInput = document.getElementById('searchInput');
        const playerBar = document.getElementById('playerBar');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeSlider = document.getElementById('volumeSlider');
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');

        // Ýüklemek funksiýasy
        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('audio/')) {
                    showToast('Diňe ses faýllary ýükläp bolýar!', 'error');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const audioTemp = new Audio();
                    audioTemp.src = e.target.result;
                    
                    audioTemp.addEventListener('loadedmetadata', () => {
                        let title = file.name.replace(/\.[^/.]+$/, '');
                        let artist = 'Näbelli Ýaradyjy';
                        
                        // Ady we ýaradyjyny aýyrmak
                        const match = file.name.match(/^(.+?)\s*[-–]\s*(.+?)\.[^.]+$/);
                        if (match) {
                            artist = match[1].trim();
                            title = match[2].trim();
                        }
                        
                        const song = {
                            id: Date.now(),
                            title: title,
                            artist: artist,
                            fileData: e.target.result,
                            duration: audioTemp.duration,
                            dateAdded: new Date().toISOString(),
                            fileName: file.name
                        };
                        
                        saveSongToDB(song);
                    });
                    
                    audioTemp.addEventListener('error', () => {
                        showToast('Faýl ýüklenmedi: ' + file.name, 'error');
                    });
                };
                
                reader.onerror = () => {
                    showToast('Faýl okalmady: ' + file.name, 'error');
                };
                
                reader.readAsDataURL(file);
            });
        }

        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        function renderSongs() {
            let filtered = [...songs];
            
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(s => 
                    s.title.toLowerCase().includes(q) || 
                    s.artist.toLowerCase().includes(q)
                );
            }
            
            if (currentFilter === 'recent') {
                filtered.sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded));
            } else if (currentFilter === 'name') {
                filtered.sort((a, b) => a.title.localeCompare(b.title));
            } else if (currentFilter === 'artist') {
                filtered.sort((a, b) => a.artist.localeCompare(b.artist));
            }
            
            if (!filtered.length) {
                musicGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-search"></i>
                        <h3>Netije tapylmady</h3>
                        <p>Başga gözleg sözüni synap görüň</p>
                    </div>
                `;
                return;
            }
            
            musicGrid.innerHTML = filtered.map((song, idx) => {
                const originalIndex = songs.findIndex(s => s.id === song.id);
                const isCurrent = originalIndex === currentSongIndex;
                return `
                    <div class="music-card ${isCurrent ? 'playing' : ''}" data-id="${song.id}">
                        <div class="card-visual">
                            <i class="fas fa-music"></i>
                            <div class="play-overlay">
                                <button class="play-btn-large" onclick="window.playSongById(${song.id})">
                                    <i class="fas ${isCurrent && isPlaying ? 'fa-pause' : 'fa-play'}"></i>
                                </button>
                            </div>
                        </div>
                        <div class="card-info">
                            <div class="card-title" title="${song.title}">${song.title}</div>
                            <div class="card-artist"><i class="fas fa-user"></i> ${song.artist}</div>
                            <div class="card-meta">
                                <span class="card-duration"><i class="fas fa-clock"></i> ${formatTime(song.duration)}</span>
                                <div class="card-actions">
                                    <button class="action-btn" onclick="window.playSongById(${song.id})" title="Oýnat">
                                        <i class="fas ${isCurrent && isPlaying ? 'fa-pause' : 'fa-play'}"></i>
                                    </button>
                                    <button class="action-btn" onclick="window.downloadSong(${song.id})" title="Ýükle">
                                        <i class="fas fa-download"></i>
                                    </button>
                                    <button class="action-btn delete" onclick="window.deleteSongById(${song.id})" title="Poz">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }
        
        window.playSongById = (id) => {
            const index = songs.findIndex(s => s.id === id);
            if (index !== -1) playSong(index);
        };
        
        window.downloadSong = (id) => {
            const song = songs.find(s => s.id === id);
            if (!song) return;
            const a = document.createElement('a');
            a.href = song.fileData;
            a.download = song.fileName || `${song.artist} - ${song.title}.mp3`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast(`"${song.title}" ýüklenýär...`);
        };
        
        window.deleteSongById = (id) => {
            if (confirm('Bu aýdymy pozmak isleýändigiňize ynanýarsyňyzmy?')) {
                deleteSongFromDB(id);
            }
        };
        
        function playSong(index) {
            if (index < 0 || index >= songs.length) return;
            
            if (currentSongIndex === index && isPlaying) {
                pauseSong();
                return;
            }
            
            currentSongIndex = index;
            const song = songs[index];
            audio.src = song.fileData;
            audio.play();
            isPlaying = true;
            playerBar.classList.add('active');
            playerTitle.textContent = song.title;
            playerArtist.textContent = song.artist;
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            renderSongs();
        }
        
        function pauseSong() {
            audio.pause();
            isPlaying = false;
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            renderSongs();
        }
        
        function togglePlay() {
            if (currentSongIndex === -1) {
                if (songs.length) playSong(0);
                return;
            }
            if (isPlaying) pauseSong();
            else {
                audio.play();
                isPlaying = true;
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                renderSongs();
            }
        }
        
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', () => {
            if (!songs.length) return;
            playSong((currentSongIndex - 1 + songs.length) % songs.length);
        });
        nextBtn.addEventListener('click', () => {
            if (!songs.length) return;
            playSong((currentSongIndex + 1) % songs.length);
        });
        
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            progressFill.style.width = ((audio.currentTime / audio.duration) * 100) + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
            totalTimeEl.textContent = formatTime(audio.duration);
        });
        
        audio.addEventListener('ended', () => nextBtn.click());
        
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        });
        
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });
        
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderSongs();
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderSongs();
            });
        });
        
        function updateStats() {
            document.getElementById('totalSongs').textContent = songs.length;
            const uniqueArtists = new Set(songs.map(s => s.artist));
            document.getElementById('totalArtists').textContent = uniqueArtists.size;
            const totalSeconds = songs.reduce((acc, s) => acc + (s.duration || 0), 0);
            document.getElementById('totalDuration').textContent = formatTime(totalSeconds);
        }
        
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function showToast(message, type = 'success') {
            const toastEl = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            toastMsg.textContent = message;
            toastEl.className = 'toast show ' + (type === 'error' ? 'error' : '');
            setTimeout(() => toastEl.classList.remove('show'), 3000);
        }
        
        // Klawiatura kontrolý
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                togglePlay();
            }
            if (e.code === 'ArrowLeft' && e.ctrlKey) {
                e.preventDefault();
                prevBtn.click();
            }
            if (e.code === 'ArrowRight' && e.ctrlKey) {
                e.preventDefault();
                nextBtn.click();
            }
        });
        
        audio.volume = 0.7;
    </script>
</body>
</html>

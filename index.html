<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aydym tekjesi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a2e 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-animation span { position: absolute; display: block; width: 20px; height: 20px; background: rgba(99, 102, 241, 0.1); animation: float 20s infinite linear; border-radius: 50%; }
        @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        .header { text-align: center; padding: 40px 20px; position: relative; }
        .header h1 { font-size: 3rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5)); } to { filter: drop-shadow(0 0 20px rgba(236, 72, 153, 0.5)); } }
        .header p { color: var(--text-muted); font-size: 1.1rem; }
        .upload-section { background: var(--bg-card); border-radius: 20px; padding: 30px; margin-bottom: 30px; border: 2px dashed var(--primary); text-align: center; transition: all 0.3s ease; cursor: pointer; position: relative; overflow: hidden; }
        .upload-section:hover { border-color: var(--secondary); transform: translateY(-2px); box-shadow: 0 10px 40px rgba(99, 102, 241, 0.2); }
        .upload-section.dragover { background: rgba(99, 102, 241, 0.1); border-color: var(--secondary); }
        .upload-section i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; display: block; }
        .upload-section h3 { margin-bottom: 10px; color: var(--text); }
        .upload-section p { color: var(--text-muted); margin-bottom: 15px; }
        .file-input { display: none; }
        .upload-btn { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-size: 1rem; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px; }
        .upload-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4); }
        .controls { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input { width: 100%; padding: 15px 20px 15px 50px; border: 2px solid var(--bg-hover); border-radius: 15px; background: var(--bg-card); color: var(--text); font-size: 1rem; transition: all 0.3s ease; }
        .search-box input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .filter-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn { padding: 12px 20px; border: 2px solid var(--bg-hover); background: var(--bg-card); color: var(--text-muted); border-radius: 12px; cursor: pointer; transition: all 0.3s ease; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
        .filter-btn:hover, .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-2px); }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card { background: var(--bg-card); padding: 20px 25px; border-radius: 15px; flex: 1; min-width: 150px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--bg-hover); transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .stat-icon.blue { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .stat-icon.pink { background: rgba(236, 72, 153, 0.2); color: var(--secondary); }
        .stat-icon.green { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .stat-info h4 { font-size: 1.5rem; color: var(--text); }
        .stat-info p { color: var(--text-muted); font-size: 0.9rem; }
        .music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 100px; }
        .music-card { background: var(--bg-card); border-radius: 20px; overflow: hidden; border: 1px solid var(--bg-hover); transition: all 0.3s ease; position: relative; }
        .music-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3); border-color: var(--primary); }
        .music-card.playing { border-color: var(--secondary); box-shadow: 0 0 30px rgba(236, 72, 153, 0.3); }
        .card-visual { height: 180px; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .card-visual::before { content: ''; position: absolute; width: 200%; height: 200%; background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px); animation: slide 20s linear infinite; }
        @keyframes slide { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .card-visual i { font-size: 4rem; color: rgba(255, 255, 255, 0.9); z-index: 1; position: relative; }
        .play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; z-index: 2; }
        .music-card:hover .play-overlay { opacity: 1; }
        .play-btn-large { width: 60px; height: 60px; border-radius: 50%; background: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--primary); transition: all 0.3s ease; }
        .play-btn-large:hover { transform: scale(1.1); }
        .card-info { padding: 20px; }
        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
        .card-artist { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
        .card-duration { color: var(--text-muted); font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }
        .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-btn { width: 36px; height: 36px; border-radius: 10px; border: none; background: var(--bg-hover); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; font-size: 0.9rem; }
        .action-btn:hover { background: var(--primary); color: white; transform: scale(1.1); }
        .action-btn.download:hover { background: var(--success); }
        .action-btn.delete:hover { background: var(--danger); }
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--bg-hover); padding: 15px 30px; display: flex; align-items: center; gap: 20px; z-index: 1000; transform: translateY(100%); transition: transform 0.3s ease; }
        .player-bar.active { transform: translateY(0); }
        .player-info { display: flex; align-items: center; gap: 15px; flex: 0 0 250px; }
        .player-cover { width: 50px; height: 50px; border-radius: 10px; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: white; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .player-text { overflow: hidden; }
        .player-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { color: var(--text-muted); font-size: 0.85rem; }
        .player-controls { display: flex; align-items: center; gap: 15px; flex: 1; justify-content: center; }
        .control-btn { background: none; border: none; color: var(--text); cursor: pointer; font-size: 1.2rem; transition: all 0.3s ease; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .control-btn:hover { background: var(--bg-hover); color: var(--primary); }
        .control-btn.play { width: 50px; height: 50px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-size: 1.3rem; }
        .control-btn.play:hover { transform: scale(1.1); box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4); }
        .progress-container { flex: 1; max-width: 400px; display: flex; align-items: center; gap: 10px; }
        .progress-bar { flex: 1; height: 6px; background: var(--bg-hover); border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 3px; width: 0%; transition: width 0.1s linear; position: relative; }
        .progress-fill::after { content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: white; border-radius: 50%; box-shadow: 0 0 10px rgba(99, 102, 241, 0.5); opacity: 0; transition: opacity 0.3s ease; }
        .progress-bar:hover .progress-fill::after { opacity: 1; }
        .time { font-size: 0.8rem; color: var(--text-muted); min-width: 40px; text-align: center; }
        .player-volume { display: flex; align-items: center; gap: 10px; flex: 0 0 150px; }
        .volume-slider { width: 100px; height: 6px; -webkit-appearance: none; appearance: none; background: var(--bg-hover); border-radius: 3px; outline: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--primary); border-radius: 50%; cursor: pointer; }
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { color: var(--text); margin-bottom: 10px; }
        .toast { position: fixed; top: 20px; right: 20px; background: var(--bg-card); color: var(--text); padding: 15px 25px; border-radius: 12px; border-left: 4px solid var(--success); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); transform: translateX(400px); transition: transform 0.3s ease; z-index: 2000; display: flex; align-items: center; gap: 10px; }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--danger); }
        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .controls { flex-direction: column; }
            .search-box { width: 100%; }
            .player-bar { flex-wrap: wrap; padding: 10px; }
            .player-info { flex: 1 1 100%; }
            .progress-container { order: 3; flex: 1 1 100%; max-width: none; }
            .player-volume { display: none; }
        }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-music"></i> Aydym tekjesi</h1>
            <p>Aydymlarynyzy ýükläň, diňläň we dolandyryň</p>
        </div>
        <div class="upload-section" id="dropZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <h3>Aydym Ýükle</h3>
            <p>MP3, WAV, OGG faýllaryny süýräň ýa-da saýlaň</p>
            <input type="file" id="fileInput" class="file-input" accept="audio/*" multiple>
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-plus"></i> Faýl Saýla
            </button>
        </div>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-music"></i></div>
                <div class="stat-info">
                    <h4 id="totalSongs">0</h4><p>Jemi Aýdym</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pink"><i class="fas fa-user"></i></div>
                <div class="stat-info">
                    <h4 id="totalArtists">0</h4><p>Ýaradyjy</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-clock"></i></div>
                <div class="stat-info">
                    <h4 id="totalDuration">0:00</h4><p>Jemi Wagt</p>
                </div>
            </div>
        </div>
        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Aýdym ýa-da ýaradyjy gözle...">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all"><i class="fas fa-th-large"></i> Hemmesi</button>
                <button class="filter-btn" data-filter="recent"><i class="fas fa-clock"></i> Soňky Goşulan</button>
                <button class="filter-btn" data-filter="name"><i class="fas fa-sort-alpha-down"></i> Ady</button>
                <button class="filter-btn" data-filter="artist"><i class="fas fa-user"></i> Ýaradyjy</button>
            </div>
        </div>
        <div class="music-grid" id="musicGrid">
            <div class="empty-state">
                <i class="fas fa-music"></i>
                <h3>Häzirlikçe aydym ýok</h3>
                <p>Ýokardan aydym ýükläp başlaň</p>
            </div>
        </div>
    </div>
    <div class="player-bar" id="playerBar">
        <div class="player-info">
            <div class="player-cover"><i class="fas fa-music"></i></div>
            <div class="player-text">
                <div class="player-title" id="playerTitle">Aýdym Saýlanmady</div>
                <div class="player-artist" id="playerArtist">-</div>
            </div>
        </div>
        <div class="player-controls">
            <button class="control-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
            <button class="control-btn play" id="playBtn"><i class="fas fa-play"></i></button>
            <button class="control-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
        </div>
        <div class="progress-container">
            <span class="time" id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time" id="totalTime">0:00</span>
        </div>
        <div class="player-volume">
            <i class="fas fa-volume-up" id="volumeIcon"></i>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
        </div>
    </div>
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Amal üstünlikli!</span>
    </div>

    <script>
        let songs = JSON.parse(localStorage.getItem('musicLibrary')) || [];
        let currentSongIndex = -1;
        let isPlaying = false;
        let audio = new Audio();
        let currentFilter = 'all';
        let searchQuery = '';

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const musicGrid = document.getElementById('musicGrid');
        const searchInput = document.getElementById('searchInput');
        const playerBar = document.getElementById('playerBar');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeSlider = document.getElementById('volumeSlider');
        const playerTitle = document.getElementById('playerTitle');
        const playerArtist = document.getElementById('playerArtist');

        document.addEventListener('DOMContentLoaded', () => {
            createBgAnimation();
            renderSongs();
            updateStats();
            audio.volume = 0.7;
        });

        function createBgAnimation() {
            const container = document.getElementById('bgAnimation');
            for (let i = 0; i < 15; i++) {
                const span = document.createElement('span');
                span.style.left = Math.random() * 100 + '%';
                span.style.animationDelay = Math.random() * 20 + 's';
                span.style.animationDuration = (15 + Math.random() * 10) + 's';
                const size = 10 + Math.random() * 30;
                span.style.width = span.style.height = `${size}px`;
                container.appendChild(span);
            }
        }

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', e => handleFiles(e.target.files));

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('audio/')) {
                    showToast('Diňe ses faýllary ýükläp bolýar!', 'error');
                    return;
                }
                const reader = new FileReader();
                reader.onload = e => {
                    const audioTemp = new Audio(e.target.result);
                    audioTemp.addEventListener('loadedmetadata', () => {
                        const song = {
                            id: Date.now() + Math.random(),
                            title: file.name.replace(/\.[^/.]+$/, ''),
                            artist: 'Näbelli Ýaradija',
                            file: e.target.result,
                            duration: audioTemp.duration,
                            dateAdded: new Date().toISOString(),
                            fileName: file.name
                        };
                        const match = file.name.match(/^(.+?)\s*[-–]\s*(.+?)\.[^.]+$/);
                        if (match) { song.artist = match[1].trim(); song.title = match[2].trim(); }
                        songs.push(song);
                        saveSongs();
                        renderSongs();
                        updateStats();
                        showToast(`"${song.title}" ýüklendi!`);
                    });
                };
                reader.readAsDataURL(file);
            });
        }

        function renderSongs() {
            let filtered = songs.slice();
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
            }
            if (currentFilter === 'recent') filtered.sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded));
            if (currentFilter === 'name') filtered.sort((a, b) => a.title.localeCompare(b.title));
            if (currentFilter === 'artist') filtered.sort((a, b) => a.artist.localeCompare(b.artist));

            if (!filtered.length) {
                musicGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-search"></i>
                        <h3>Netije tapylmady</h3>
                        <p>Başga gözleg sözüni synap görüň</p>
                    </div>
                `;
                return;
            }

            musicGrid.innerHTML = filtered.map(song => {
                const index = songs.indexOf(song);
                const isCurrent = index === currentSongIndex;
                return `
                    <div class="music-card ${isCurrent ? 'playing' : ''}" data-id="${song.id}">
                        <div class="card-visual">
                            <i class="fas fa-music"></i>
                            <div class="play-overlay">
                                <button class="play-btn-large" onclick="playSong(${index})">
                                    <i class="fas ${isCurrent && isPlaying ? 'fa-pause' : 'fa-play'}"></i>
                                </button>
                            </div>
                        </div>
                        <div class="card-info">
                            <div class="card-title" title="${song.title}">${song.title}</div>
                            <div class="card-artist"><i class="fas fa-user"></i> ${song.artist}</div>
                            <div class="card-meta">
                                <span class="card-duration"><i class="fas fa-clock"></i> ${formatTime(song.duration)}</span>
                                <div class="card-actions">
                                    <button class="action-btn" onclick="playSong(${index})" title="Oýnat">
                                        <i class="fas ${isCurrent && isPlaying ? 'fa-pause' : 'fa-play'}"></i>
                                    </button>
                                    <button class="action-btn download" onclick="downloadSong(${song.id})" title="Ýükle">
                                        <i class="fas fa-download"></i>
                                    </button>
                                    <button class="action-btn delete" onclick="deleteSong(${song.id})" title="Poz">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function playSong(index) {
            if (index < 0 || index >= songs.length) return;
            if (currentSongIndex === index && isPlaying) { pauseSong(); return; }
            currentSongIndex = index;
            const song = songs[index];
            audio.src = song.file;
            audio.play();
            isPlaying = true;
            playerBar.classList.add('active');
            playerTitle.textContent = song.title;
            playerArtist.textContent = song.artist;
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            renderSongs();
        }

        function pauseSong() {
            audio.pause();
            isPlaying = false;
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            renderSongs();
        }

        function togglePlay() {
            if (currentSongIndex === -1) { if (songs.length) playSong(0); return; }
            if (isPlaying) pauseSong();
            else { audio.play(); isPlaying = true; playBtn.innerHTML = '<i class="fas fa-pause"></i>'; renderSongs(); }
        }

        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', () => { if (!songs.length) return; playSong((currentSongIndex - 1 + songs.length) % songs.length); });
        nextBtn.addEventListener('click', () => { if (!songs.length) return; playSong((currentSongIndex + 1) % songs.length); });

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            progressFill.style.width = ((audio.currentTime / audio.duration) * 100) + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
            totalTimeEl.textContent = formatTime(audio.duration);
        });
        audio.addEventListener('ended', () => nextBtn.click());
        progressBar.addEventListener('click', e => {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        });

        volumeSlider.addEventListener('input', e => {
            audio.volume = e.target.value / 100;
            const icon = document.getElementById('volumeIcon');
            if (audio.volume === 0) icon.className = 'fas fa-volume-mute';
            else if (audio.volume < 0.5) icon.className = 'fas fa-volume-down';
            else icon.className = 'fas fa-volume-up';
        });

        function downloadSong(id) {
            const song = songs.find(s => s.id === id);
            if (!song) return;
            const a = document.createElement('a');
            a.href = song.file;
            a.download = song.fileName || `${song.artist} - ${song.title}.mp3`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast(`"${song.title}" ýüklenýär...`);
        }

        function deleteSong(id) {
            if (!confirm('Bu aýdymy pozmak isleýändigiňize ynanýarsyňyzmy?')) return;
            const index = songs.findIndex(s => s.id === id);
            if (index === currentSongIndex) { pauseSong(); currentSongIndex = -1; playerBar.classList.remove('active'); }
            songs = songs.filter(s => s.id !== id);
            saveSongs();
            renderSongs();
            updateStats();
            showToast('Aýdym pozuldy');
        }

        searchInput.addEventListener('input', e => { searchQuery = e.target.value; renderSongs(); });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderSongs();
            });
        });

        function updateStats() {
            document.getElementById('totalSongs').textContent = songs.length;
            document.getElementById('totalArtists').textContent = new Set(songs.map(s => s.artist)).size;
            const totalSeconds = songs.reduce((acc, s) => acc + (s.duration || 0), 0);
            document.getElementById('totalDuration').textContent = formatTime(totalSeconds);
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function saveSongs() {
            localStorage.setItem('musicLibrary', JSON.stringify(songs));
        }

        function showToast(message, type = 'success') {
            const toastEl = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            const icon = toastEl.querySelector('i');
            toastMsg.textContent = message;
            toastEl.className = 'toast show ' + (type === 'error' ? 'error' : '');
            icon.className = type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
            setTimeout(() => toastEl.classList.remove('show'), 3000);
        }

        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && e.target.tagName !== 'INPUT') { e.preventDefault(); togglePlay(); }
            if (e.code === 'ArrowLeft' && e.ctrlKey) { e.preventDefault(); prevBtn.click(); }
            if (e.code === 'ArrowRight' && e.ctrlKey) { e.preventDefault(); nextBtn.click(); }
        });
    </script>
</body>
</html>

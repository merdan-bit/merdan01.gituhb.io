<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panelli Müzik Sitesi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a2e 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .header {
            text-align: center;
            padding: 40px 20px;
        }
        .header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        
        /* Admin Butonu */
        .admin-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--warning), var(--secondary));
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 999;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(236, 72, 153, 0.4);
        }
        
        /* Admin Panel Modal */
        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .admin-modal.show {
            display: flex;
        }
        .admin-modal-content {
            background: var(--bg-card);
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            border: 2px solid var(--primary);
            max-height: 80vh;
            overflow-y: auto;
        }
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }
        .close-modal:hover {
            color: var(--danger);
        }
        .admin-modal-content h2 {
            margin-bottom: 20px;
            color: var(--primary);
        }
        
        /* Login Form */
        .login-form input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            background: var(--bg-dark);
            border: 2px solid var(--bg-hover);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
        }
        .login-form input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .login-form button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .login-form button:hover {
            transform: translateY(-2px);
        }
        
        /* Admin Panel İçeriği */
        .admin-stats {
            background: var(--bg-dark);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .admin-stats p {
            margin: 8px 0;
        }
        .upload-area {
            border: 2px dashed var(--primary);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: var(--secondary);
            background: rgba(99, 102, 241, 0.05);
        }
        .upload-area.dragover {
            border-color: var(--secondary);
            background: rgba(236, 72, 153, 0.1);
        }
        .upload-area i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .upload-btn-admin {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 15px;
        }
        .logout-btn {
            background: var(--danger);
            margin-top: 20px;
        }
        .song-list-admin {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .admin-song-item {
            background: var(--bg-dark);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-song-item span {
            flex: 1;
            font-size: 0.9rem;
        }
        .delete-song-btn {
            background: var(--danger);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        /* İstatistikler */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 20px 25px;
            border-radius: 15px;
            flex: 1;
            min-width: 150px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid var(--bg-hover);
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .stat-icon.blue { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .stat-icon.pink { background: rgba(236, 72, 153, 0.2); color: var(--secondary); }
        .stat-icon.green { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .stat-info h4 { font-size: 1.5rem; }
        .stat-info p { color: var(--text-muted); font-size: 0.9rem; }
        
        /* Kontroller */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid var(--bg-hover);
            border-radius: 15px;
            background: var(--bg-card);
            color: var(--text);
            font-size: 1rem;
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 12px 20px;
            border: 2px solid var(--bg-hover);
            background: var(--bg-card);
            color: var(--text-muted);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Müzik Grid */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 100px;
        }
        .music-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--bg-hover);
            transition: all 0.3s ease;
        }
        .music-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border-color: var(--primary);
        }
        .music-card.playing {
            border-color: var(--secondary);
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.3);
        }
        .card-visual {
            height: 180px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        .card-visual i {
            font-size: 4rem;
            color: rgba(255,255,255,0.9);
        }
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .music-card:hover .play-overlay {
            opacity: 1;
        }
        .play-btn-large {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--primary);
            transition: all 0.3s ease;
        }
        .play-btn-large:hover {
            transform: scale(1.1);
        }
        .card-info {
            padding: 20px;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-artist {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-duration {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .card-actions {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--bg-hover);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .action-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }
        .action-btn.download:hover {
            background: var(--success);
        }
        
        /* Player Bar */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--bg-hover);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .player-bar.active {
            transform: translateY(0);
        }
        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 0 0 250px;
        }
        .player-cover {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .player-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-artist {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            justify-content: center;
        }
        .control-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.2rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .control-btn:hover {
            background: var(--bg-hover);
            transform: scale(1.1);
        }
        .control-btn.play {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        .progress-container {
            flex: 1;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--bg-hover);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
            width: 0%;
        }
        .time {
            font-size: 0.8rem;
            color: var(--text-muted);
            min-width: 40px;
        }
        .player-volume {
            flex: 0 0 150px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .volume-slider {
            width: 100px;
            height: 6px;
            -webkit-appearance: none;
            background: var(--bg-hover);
            border-radius: 3px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            color: var(--text);
            padding: 15px 25px;
            border-radius: 12px;
            border-left: 4px solid var(--success);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2001;
        }
        .toast.show {
            transform: translateX(0);
        }
        .toast.error {
            border-left-color: var(--danger);
        }
        
        @media (max-width: 768px) {
            .player-volume { display: none; }
            .progress-container { order: 3; flex: 1 1 100%; max-width: none; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-music"></i> Aydym Tekjesi</h1>
            <p>Aydymlarynyzy diňläň we indiriň</p>
        </div>
        
        <!-- İstatistikler -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-music"></i></div>
                <div class="stat-info">
                    <h4 id="totalSongs">0</h4>
                    <p>Jemi Aýdym</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pink"><i class="fas fa-user"></i></div>
                <div class="stat-info">
                    <h4 id="totalArtists">0</h4>
                    <p>Ýaradyjy</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-clock"></i></div>
                <div class="stat-info">
                    <h4 id="totalDuration">0:00</h4>
                    <p>Jemi Wagt</p>
                </div>
            </div>
        </div>
        
        <!-- Kontroller -->
        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Aýdym ýa-da ýaradyjy gözle...">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all"><i class="fas fa-th-large"></i> Hemmesi</button>
                <button class="filter-btn" data-filter="recent"><i class="fas fa-clock"></i> Soňky Goşulan</button>
                <button class="filter-btn" data-filter="name"><i class="fas fa-sort-alpha-down"></i> Ady</button>
                <button class="filter-btn" data-filter="artist"><i class="fas fa-user"></i> Ýaradyjy</button>
            </div>
        </div>
        
        <!-- Müzik Listesi -->
        <div class="music-grid" id="musicGrid">
            <div class="empty-state">
                <i class="fas fa-music"></i>
                <h3>Häzirlikçe aydym ýok</h3>
                <p>Admin tarapyndan aydymlar goşuljak</p>
            </div>
        </div>
    </div>
    
    <!-- Player Bar -->
    <div class="player-bar" id="playerBar">
        <div class="player-info">
            <div class="player-cover"><i class="fas fa-music"></i></div>
            <div class="player-text">
                <div class="player-title" id="playerTitle">Aýdym Saýlanmady</div>
                <div class="player-artist" id="playerArtist">-</div>
            </div>
        </div>
        <div class="player-controls">
            <button class="control-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
            <button class="control-btn play" id="playBtn"><i class="fas fa-play"></i></button>
            <button class="control-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
        </div>
        <div class="progress-container">
            <span class="time" id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time" id="totalTime">0:00</span>
        </div>
        <div class="player-volume">
            <i class="fas fa-volume-up"></i>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
        </div>
    </div>
    
    <!-- Admin Butonu -->
    <button class="admin-btn" id="adminBtn">
        <i class="fas fa-user-shield"></i>
    </button>
    
    <!-- Admin Modal -->
    <div class="admin-modal" id="adminModal">
        <div class="admin-modal-content">
            <span class="close-modal" id="closeModalBtn">&times;</span>
            <div id="adminPanelContent">
                <!-- İçerik dinamik olarak doldurulacak -->
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Amal üstünlikli!</span>
    </div>

    <script>
        // ============ YAPILANDIRMA ============
        const ADMIN_PASSWORD = "admin123";  // Admin parolu - İstediğin gibi değiştirebilirsin
        let isAdmin = false;
        
        // IndexedDB
        let db;
        let songs = [];
        let currentSongIndex = -1;
        let isPlaying = false;
        let audio = new Audio();
        let currentFilter = 'all';
        let searchQuery = '';
        
        // ============ INDEXEDDB İŞLEMLERİ ============
        const request = indexedDB.open('MusicLibrary', 1);
        
        request.onerror = () => console.log('DB error');
        request.onsuccess = (e) => {
            db = e.target.result;
            loadSongsFromDB();
        };
        
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains('songs')) {
                const store = db.createObjectStore('songs', { keyPath: 'id' });
                store.createIndex('dateAdded', 'dateAdded');
            }
        };
        
        function loadSongsFromDB() {
            const transaction = db.transaction(['songs'], 'readonly');
            const store = transaction.objectStore('songs');
            const getAll = store.getAll();
            
            getAll.onsuccess = () => {
                songs = getAll.result || [];
                renderSongs();
                updateStats();
                if (isAdmin) updateAdminSongList();
            };
        }
        
        function saveSongToDB(song) {
            const transaction = db.transaction(['songs'], 'readwrite');
            const store = transaction.objectStore('songs');
            store.add(song);
            
            transaction.oncomplete = () => {
                songs.push(song);
                renderSongs();
                updateStats();
                if (isAdmin) updateAdminSongList();
                showToast(`"${song.title}" ýüklendi!`, 'success');
            };
        }
        
        function deleteSongFromDB(id) {
            const transaction = db.transaction(['songs'], 'readwrite');
            const store = transaction.objectStore('songs');
            store.delete(id);
            
            transaction.oncomplete = () => {
                songs = songs.filter(s => s.id !== id);
                if (currentSongIndex !== -1 && songs[currentSongIndex]?.id === id) {
                    pauseSong();
                    currentSongIndex = -1;
                    playerBar.classList.remove('active');
                }
                renderSongs();
                updateStats();
                if (isAdmin) updateAdminSongList();
                showToast('Aýdym pozuldy', 'success');
            };
        }
        
        // ============ ADMIN PANEL ============
        function showAdminLogin() {
            document.getElementById('adminPanelContent').innerHTML = `
                <h2><i class="fas fa-lock"></i> Admin Giriş</h2>
                <div class="login-form">
                    <input type="password" id="adminPasswordInput" placeholder="Admin paroluny giriziň">
                    <button onclick="loginAdmin()">Giriş</button>
                </div>
            `;
        }
        
        window.loginAdmin = () => {
            const password = document.getElementById('adminPasswordInput').value;
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                localStorage.setItem('isAdmin', 'true');
                showAdminPanel();
                showToast('Admin paneline hoş geldiňiz!', 'success');
            } else {
                showToast('Parol ýalňyş!', 'error');
            }
        };
        
        function showAdminPanel() {
            const totalDuration = songs.reduce((acc, s) => acc + (s.duration || 0), 0);
            document.getElementById('adminPanelContent').innerHTML = `
                <h2><i class="fas fa-user-cog"></i> Admin Panel</h2>
                <div class="admin-stats">
                    <p><i class="fas fa-music"></i> Jemi aýdym: ${songs.length}</p>
                    <p><i class="fas fa-user"></i> Ýaradyjylar: ${new Set(songs.map(s => s.artist)).size}</p>
                    <p><i class="fas fa-clock"></i> Jemi wagt: ${formatTime(totalDuration)}</p>
                </div>
                
                <h3><i class="fas fa-cloud-upload-alt"></i> Aýdym Ýükle</h3>
                <div class="upload-area" id="adminUploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>MP3, WAV, OGG faýllaryny süýräň ýa-da saýlaň</p>
                    <input type="file" id="adminFileInput" accept="audio/*" multiple style="display:none">
                    <button class="upload-btn-admin" id="adminUploadBtn">
                        <i class="fas fa-plus"></i> Faýl Saýla
                    </button>
                </div>
                
                <h3><i class="fas fa-list"></i> Aýdymlary Dolandyryş</h3>
                <div class="song-list-admin" id="adminSongList"></div>
                
                <button class="upload-btn-admin logout-btn" onclick="logoutAdmin()">
                    <i class="fas fa-sign-out-alt"></i> Çykyş
                </button>
            `;
            
            // Upload eventleri
            const adminUploadArea = document.getElementById('adminUploadArea');
            const adminFileInput = document.getElementById('adminFileInput');
            const adminUploadBtn = document.getElementById('adminUploadBtn');
            
            adminUploadBtn.addEventListener('click', () => adminFileInput.click());
            adminFileInput.addEventListener('change', (e) => handleAdminUpload(e.target.files));
            
            adminUploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                adminUploadArea.classList.add('dragover');
            });
            
            adminUploadArea.addEventListener('dragleave', () => {
                adminUploadArea.classList.remove('dragover');
            });
            
            adminUploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                adminUploadArea.classList.remove('dragover');
                handleAdminUpload(e.dataTransfer.files);
            });
            
            updateAdminSongList();
        }
        
        function updateAdminSongList() {
            const container = document.getElementById('adminSongList');
            if (!container) return;
            
            if (songs.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Hiç aýdym ýok</p>';
                return;
            }
            
            container.innerHTML = songs.map(song => `
                <div class="admin-song-item">
                    <span><strong>${song.title}</strong><br><small>${song.artist}</small></span>
                    <button class="delete-song-btn" onclick="deleteSongById(${song.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }
        
        function handleAdminUpload(files) {
            if (!isAdmin) {
                showToast('Diňe admin aýdym ýükläp bilýär!', 'error');
                return;
            }
            
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('audio/')) {
                    showToast('Diňe ses faýllary ýükläp bolýar!', 'error');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const audioTemp = new Audio();
                    audioTemp.src = e.target.result;
                    
                    audioTemp.addEventListener('loadedmetadata', () => {
                        let title = file.name.replace(/\.[^/.]+$/, '');
                        let artist = 'Näbelli Ýaradyjy';
                        
                        const match = file.name.match(/^(.+?)\s*[-–]\s*(.+?)\.[^.]+$/);
                        if (match) {
                            artist = match[1].trim();
                            title = match[2].trim();
                        }
                        
                        const song = {
                            id: Date.now(),
                            title: title,
                            artist: artist,
                            fileData: e.target.result,
                            duration: audioTemp.duration,
                            dateAdded: new Date().toISOString(),
                            fileName: file.name
                        };
                        
                        saveSongToDB(song);
                    });
                };
                reader.readAsDataURL(file);
            });
        }
        
        window.logoutAdmin = () => {
            isAdmin = false;
            localStorage.removeItem('isAdmin');
            showAdminLogin();
            showToast('Admin panelinden çykdyňyz', 'success');
        };
        
        window.deleteSongById = (id) => {
            if (!isAdmin) {
                showToast('Diňe admin aýdym pozip bilýär!', 'error');
                return;
            }
            if (confirm('Bu aýdymy pozmak isleýändigiňize ynanýarsyňyzmy?')) {
                deleteSongFromDB(id);
            }
        };
        
        // ============ MODAL KONTROL ============
        const adminBtn = document.getElementById('adminBtn');
        const adminModal = document.getElementById('adminModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        
        adminBtn.addEventListener('click', () => {
            adminModal.classList.add('show');
            if (isAdmin) {
                showAdminPanel();
            } else {
                showAdminLogin();
            }
        });
        
        closeModalBtn.addEventListener('click', () => {
            adminModal.classList.remove('show');
        });
        
        adminModal.addEventListener('click', (e) => {
            if (e.target === adminModal) {
                adminModal.classList.remove('show');
            }
        });
        
        // Admin durumunu kontrol et
        if (localStorage.getItem('isAdmin') === 'true') {
            isAdmin = true;
        }

            if (currentFilter === 'recent') {
